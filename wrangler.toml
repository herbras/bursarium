# Cloudflare Workers config for IDX-API (Hono + D1 + Queue).
#
# Bindings created at deploy time:
#   - D1 database: idx-api  (run: wrangler d1 create idx-api)
#   - Queue:       idx-sync (run: wrangler queues create idx-sync)
#
# Replace the placeholder UUIDs/IDs below after creating resources.

name = "bursarium"
main = "worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Optional: usage limits + observability
[observability]
enabled = true

[observability.logs]
invocation_logs = true

# ---- D1 (SQLite at the edge) ----
[[d1_databases]]
binding = "DB"
database_name = "idx-api"
database_id = "REPLACE_WITH_D1_ID_AFTER_CREATE"
migrations_dir = "drizzle"

# ---- Queue: producer (scheduled handler enqueues sync jobs) ----
[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "idx-sync"

# ---- Queue: consumer (separate handler in same Worker processes jobs) ----
[[queues.consumers]]
queue = "idx-sync"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "idx-sync-dlq"

# ---- Cron Triggers ----
# Daily syncs at 18:30 WIB (11:30 UTC) — after IDX closes
# Monthly syncs at 02:00 WIB on the 1st of each month (19:00 UTC previous day)
[triggers]
crons = [
  "30 11 * * *",      # daily — 18:30 WIB
  "0 19 1 * *"        # monthly — 02:00 WIB on day 1 (UTC -7)
]

# ---- Browser Rendering (cookie warmer) ----
# Free Explorer tier: 10 hours/month, 5 concurrent sessions.
# Used to bypass IDX's CF Bot Management ONCE per cron run; resulting
# cookies are cached in KV and reused by all sync consumers.
# See worker/lib/cookie-warmer.ts.
[browser]
binding = "BROWSER"

# ---- KV: cookie cache for IDX session ----
# Stores serialized __cf_bm + _cfuvid cookies with ~25 min TTL.
# Create:  wrangler kv namespace create COOKIE_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "COOKIE_KV"
id = "REPLACE_WITH_KV_ID_AFTER_CREATE"

# ---- Optional R2 bucket for static assets (company logos) ----
# Uncomment after `wrangler r2 bucket create idx-assets`
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "idx-assets"

# ---- Vars (non-secret) ----
[vars]
IDX_BASE_URL = "https://www.idx.co.id"
LOG_LEVEL = "info"

# Secrets (set via `wrangler secret put <NAME>`):
#   - DIAG_TOKEN — required to access /_test/* diagnostic endpoints.
#                  When unset, /_test/* always 404s (safe default).
#                  Set via:  wrangler secret put DIAG_TOKEN
#                  For local dev, put it in .dev.vars (gitignored):
#                    DIAG_TOKEN="local-dev-token"
