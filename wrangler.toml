# Cloudflare Workers config for IDX-API (Hono + D1 + Queue).
#
# Bindings created at deploy time:
#   - D1 database: idx-api  (run: wrangler d1 create idx-api)
#   - Queue:       idx-sync (run: wrangler queues create idx-sync)
#
# Replace the placeholder UUIDs/IDs below after creating resources.

name = "bursarium"
main = "worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Custom domain — auto-provisions DNS A record + cert.
# Requires sarbeh.com to be in this Cloudflare account as a zone.
# Primary API endpoint — generic api.sarbeh.com prefix.
# (bursarium.sarbeh.com previously routed here, now points to frontend.)
[[routes]]
pattern = "api.sarbeh.com"
custom_domain = true

# Optional: usage limits + observability
[observability]
enabled = true

[observability.logs]
invocation_logs = true

# ---- D1 (SQLite at the edge) ----
[[d1_databases]]
binding = "DB"
database_name = "idx-api"
database_id = "1f0bf8d2-5a6a-464e-b2cd-05421a9b559e"
migrations_dir = "drizzle"

# ---- Queue: producer (scheduled handler enqueues sync jobs) ----
[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "idx-sync"

# ---- Queue: consumer (separate handler in same Worker processes jobs) ----
[[queues.consumers]]
queue = "idx-sync"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "idx-sync-dlq"

# ---- Cron Triggers ----
# Single hourly cron — dispatcher.ts decides what to enqueue based on WIB time:
#   - INTRADAY (indexList, stockScreener): 09:00-16:00 WIB Mon-Fri
#   - DAILY (full snapshots):              18:00 WIB every day
#   - MONTHLY (financials, dividends):     18:00 WIB on day 1
# `0 * * * *` = every hour at :00 UTC.
#
# CURRENTLY DISABLED — account at 5/5 cron limit. To enable:
#   1. Free 1 cron slot in another Worker
#   2. Uncomment below
#   3. wrangler deploy
#
# Alternative without Workers Cron: see .github/workflows/sync.yml
# (GitHub Actions cron hits /_test/run-sync — no quota impact).
# [triggers]
# crons = ["0 * * * *"]

# ---- Browser Rendering (cookie warmer) ----
# Free Explorer tier: 10 hours/month, 5 concurrent sessions.
# Used to bypass IDX's CF Bot Management ONCE per cron run; resulting
# cookies are cached in KV and reused by all sync consumers.
# See worker/lib/cookie-warmer.ts.
[browser]
binding = "BROWSER"

# ---- KV: cookie cache for IDX session ----
# Stores serialized __cf_bm + _cfuvid cookies with ~25 min TTL.
# Create:  wrangler kv namespace create COOKIE_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "COOKIE_KV"
id = "ac18dfe80e1a4b149918601ec3187067"

# ---- Optional R2 bucket for static assets (company logos) ----
# Uncomment after `wrangler r2 bucket create idx-assets`
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "idx-assets"

# ---- Vars (non-secret) ----
[vars]
IDX_BASE_URL = "https://www.idx.co.id"
LOG_LEVEL = "info"

# Secrets (set via `wrangler secret put <NAME>`):
#   - DIAG_TOKEN — required to access /_test/* diagnostic endpoints.
#                  When unset, /_test/* always 404s (safe default).
#                  Set via:  wrangler secret put DIAG_TOKEN
#                  For local dev, put it in .dev.vars (gitignored):
#                    DIAG_TOKEN="local-dev-token"
